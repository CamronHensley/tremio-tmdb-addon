name: Catalog Rotation

on:
  # DISABLED - Run manually only for now
  # schedule:
  #   - cron: '0 6 * * *'  # 6 AM UTC daily (after nightly update)

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  rotate-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run catalog rotation
        run: node scripts/rotate-catalog.js
        env:
          NETLIFY_ACCESS_TOKEN: ${{ secrets.NETLIFY_ACCESS_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Report status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Catalog rotation completed successfully"
          else
            echo "❌ Catalog rotation failed"
            exit 1
          fi
